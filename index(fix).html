  H36:{v:'결재'},I36:{v:'팀장 □'},J36:{v:'부장 □'},K36:{v:'임원 □'},
};

// ════════════════════════════════════
//  BUILD GRID
// ════════════════════════════════════
function buildGrid() {
  const g = document.getElementById('grid');
  let h = '<thead><tr>';
  h += `<th class="corner-th"></th>`;
  for(let c=1;c<COLS.length;c++)
    h += `<th class="col-header" style="width:${COL_W[c]}px;min-width:${COL_W[c]}px">${COLS[c]}</th>`;
  h += '</tr></thead><tbody>';

  for(let r=1;r<=NROWS;r++) {
    h += '<tr>';
    h += `<td class="row-header">${r}</td>`;
    for(let c=1;c<COLS.length;c++) {
      const key = COLS[c]+r;
      const d = DEF[key];
      if(d) {
        const cls = 'cell ' + (d.cls||'');
        const id = d.id ? `id="${d.id}"` : '';
        const onclick = d.click ? `onclick="cellAct('${d.id||d.click}')"` : (d.edit ? `onclick="focusEdit('${d.id}','${d.edit}')"` : '');
        h += `<td class="${cls}" ${id} ${onclick} data-k="${key}">${d.v||''}</td>`;
      } else if(r>=8&&r<=33) {
        const ri = r-8;
        if(c===3) h += `<td class="cell c-num" id="h${ri}-n" data-k="${key}"></td>`;
        else if(c===4) h += `<td class="cell c-bold" id="h${ri}-w" data-k="${key}"></td>`;
        else if(c===5) h += `<td class="cell" id="h${ri}-p" data-k="${key}"></td>`;
        else if(c===6) h += `<td class="cell c-num" id="h${ri}-l" data-k="${key}"></td>`;
        else if(c===7) h += `<td class="cell" id="h${ri}-f" data-k="${key}"></td>`;
        else if(c===8) h += `<td class="cell" id="h${ri}-e" data-k="${key}"></td>`;
        else if(c===9) h += `<td class="cell" id="h${ri}-t" data-k="${key}"></td>`;
        else if(c===10) h += `<td class="cell c-green" id="h${ri}-v" data-k="${key}"></td>`;
        else if(c===12) h += `<td class="cell" id="h${ri}-c" data-k="${key}"></td>`;
        else h += `<td class="cell" data-k="${key}"></td>`;
      } else {
        h += `<td class="cell" data-k="${key}"></td>`;
      }
    }
    h += '</tr>';
  }
  h += '</tbody>';
  g.innerHTML = h;

  g.addEventListener('click', e => {
    const td = e.target.closest('td[data-k]');
    if(!td) return;
    // deselect previous
    document.querySelectorAll('.cell.selected').forEach(x => x.classList.remove('selected'));
    td.classList.add('selected');
    document.getElementById('cell-ref').textContent = td.getAttribute('data-k');
    const d = DEF[td.getAttribute('data-k')];
    const fb = document.getElementById('formula-bar-input');
    if(d?.v?.startsWith('=')) fb.value = d.v;
    else fb.value = td.textContent;
    document.getElementById('sb-mode').textContent = '셀 모드: ' + td.getAttribute('data-k');
  });
}

// ════════════════════════════════════
//  EDITABLE FIELDS
// ════════════════════════════════════
let vals = { nick:'', code:'', word:'' };
let editField = null;

function focusEdit(id, field) {
  editField = field;
  const ri = document.getElementById('real-input');
  ri.value = vals[field] || '';
  ri.style.pointerEvents = 'auto';
  ri.focus();
  const el = document.getElementById(id);
  if(el) {
    document.querySelectorAll('.cell.selected').forEach(x=>x.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('cell-ref').textContent = el.getAttribute('data-k') || id;
    document.getElementById('formula-bar-input').value = vals[field] || '';
    document.getElementById('sb-mode').textContent = '셀 모드: 편집';
  }
}

document.getElementById('formula-bar-input').addEventListener('focus', function() {
  if(editField==='word') this.removeAttribute('readonly');
});
document.getElementById('formula-bar-input').addEventListener('input', function() {
  if(editField) {
    vals[editField] = this.value;
    syncFieldDisplay(editField);
  }
});

document.getElementById('real-input').addEventListener('input', function() {
  if(!editField) return;
  const v = editField==='code' ? this.value.toUpperCase() : this.value;
  vals[editField] = v;
  document.getElementById('formula-bar-input').value = v;
  syncFieldDisplay(editField);
});
document.getElementById('real-input').addEventListener('keydown', function(e) {
  if(e.key==='Enter') {
    if(editField==='word') { submitWord(); return; }
    editField = null;
  }
  if(e.key==='Escape') editField = null;
});

function syncFieldDisplay(f) {
  if(f==='nick') { const el=document.getElementById('inp-nick'); if(el) el.textContent=vals.nick||''; }
  if(f==='code') { const el=document.getElementById('inp-code'); if(el) el.textContent=vals.code||''; }
  if(f==='word') {
    const el=document.getElementById('cell-wordinput');
    if(el) el.textContent=vals.word||'여기 클릭 후 입력';
  }
}

// ════════════════════════════════════
//  CELL ACTIONS
// ════════════════════════════════════
function cellAct(id) {
  if(id==='btn-create'||id==='create') createRoom();
  else if(id==='btn-join'||id==='join') joinRoom();
  else if(id==='start-btn'||id==='start') startGame();
  else if(id==='submit-btn'||id==='submit') submitWord();
}

// ════════════════════════════════════
//  UTILS
// ════════════════════════════════════
function genCode() { return Math.random().toString(36).substr(2,6).toUpperCase(); }

function sc(id, v, cls) {
  const el = document.getElementById(id);
  if(!el) return;
  el.textContent = v;
  if(cls) {
    el.className = el.className
      .replace(/\b(c-green|c-yellow|c-red|c-blue)\b/g,'').trim() + ' ' + cls;
  }
}

function flashErr(msg) {
  const el = document.getElementById('cell-wordinput');
  if(el) { el.classList.add('err-flash'); setTimeout(()=>el.classList.remove('err-flash'),350); }
  sc('cell-inputmsg', '⚠ '+msg, 'c-red');
  setTimeout(()=>sc('cell-inputmsg',''),2500);
}

function addChatRow(name, msg) {
  for(let i=0;i<26;i++) {
    const el=document.getElementById('h'+i+'-c');
    if(el && el.textContent==='') { el.textContent='['+name+'] '+msg; return; }
  }
  // scroll up
  for(let i=0;i<25;i++) {
    const a=document.getElementById('h'+i+'-c');
    const b=document.getElementById('h'+(i+1)+'-c');
    if(a&&b) a.textContent=b.textContent;
  }
  const last=document.getElementById('h25-c');
  if(last) last.textContent='['+name+'] '+msg;
}

// ════════════════════════════════════
//  GAME
// ════════════════════════════════════
function getNick() {
  if(!vals.nick.trim()) { flashErr('D4 셀에 닉네임 입력 후 시도하세요'); return null; }
  return vals.nick.trim();
}

async function createRoom() {
  myNickname = getNick(); if(!myNickname) return;
  if(!db) { demoMode(); return; }
  roomCode=genCode(); isHost=true; playerKey='p1';
  await db.ref('rooms/'+roomCode).set({
    status:'waiting', p1:{id:myId,name:myNickname,score:0}, p2:null, game:null, chat:null
  });
  sc('cell-roomshow', roomCode);
  sc('cell-status','대기중 — 코드: '+roomCode,'c-yellow');
  sc('p1-name', myNickname,'c-green');
  document.title='['+roomCode+'] 2025_Q2_업무보고.xlsx — Microsoft Excel';
  setupListeners();
  addChatRow('시스템','방 생성: '+roomCode+' | F4셀에 코드 입력 후 [참가하기] 클릭 안내');
}

async function joinRoom() {
  myNickname = getNick(); if(!myNickname) return;
  const code = vals.code.trim().toUpperCase();
  if(!code||code.length!==6){flashErr('F4 셀에 6자리 방 코드 입력');return;}
  if(!db){flashErr('Firebase 설정이 필요합니다');return;}
  const snap=await db.ref('rooms/'+code).get();
  if(!snap.exists()){flashErr('방 코드가 존재하지 않습니다');return;}
  const room=snap.val();
  if(room.p2){flashErr('방이 가득 찼습니다');return;}
  roomCode=code; isHost=false; playerKey='p2';
  await db.ref('rooms/'+roomCode+'/p2').set({id:myId,name:myNickname,score:0});
  await db.ref('rooms/'+roomCode+'/status').set('ready');
  sc('cell-status','참가완료','c-green');
  sc('p2-name',myNickname,'c-green');
  document.title='['+roomCode+'] 2025_Q2_업무보고.xlsx — Microsoft Excel';
  setupListeners();
  addChatRow('시스템','방 ['+roomCode+'] 참가 완료');
}

function setupListeners() {
  roomRef=db.ref('rooms/'+roomCode);
  roomRef.child('p1').on('value',()=>syncPlayers());
  roomRef.child('p2').on('value',snap=>{
    const p2=snap.val();
    if(p2&&isHost){sc('p2-name',p2.name,'c-green');addChatRow('시스템',p2.name+' 님 참가');}
    syncPlayers();
  });
  roomRef.child('game').on('value',snap=>{const g=snap.val();if(!g)return;gameState=g;renderGame(g);});
  roomRef.child('chat').on('child_added',snap=>{
    const m=snap.val();if(m.id!==myId)addChatRow(m.name,m.text);
  });
}

async function syncPlayers() {
  if(!roomRef) return;
  const snap=await roomRef.get(); const room=snap.val();
  if(room?.p1) sc('p1-name',room.p1.name,'c-green');
  if(room?.p2) sc('p2-name',room.p2.name,'c-green');
}

async function startGame() {
  if(!isHost){flashErr('방장만 시작 가능');return;}
  const snap=await roomRef.get(); const room=snap.val();
  if(!room.p2){flashErr('상대방이 아직 참가하지 않았습니다');return;}
  const fw=['사과','바나나','고양이','강아지','컴퓨터','학교','버스','하늘','바람','나무','기차','도시','사자','호랑이','코끼리'][Math.floor(Math.random()*15)];
  await roomRef.child('game').set({
    status:'playing',turn:'p1',currentWord:fw,
    words:[{word:fw,player:'p1',name:room.p1.name,ts:Date.now()}],
    usedWords:{[fw]:true},turnStart:Date.now(),p1Score:0,p2Score:0
  });
  await roomRef.child('status').set('playing');
}

function renderGame(g) {
  if(g.status==='ended'){endGame(g);return;}
  const lw=g.currentWord, lc=lw[lw.length-1], mine=g.turn===playerKey;
  sc('cell-curword',lw,'c-bold c-big');
  sc('cell-nextchar',lc+' →','c-bold c-big c-green');
  sc('cell-turn',mine?'★ 내 차례':'상대 차례',mine?'c-green':'c-yellow');
  sc('cell-status','진행중','c-green');
  sc('start-btn','진행중','c-green');

  const wi=document.getElementById('cell-wordinput');
  if(wi){
    wi.textContent=mine?(vals.word||lc+'... 입력'):'상대방 입력 중...';
    wi.style.color=mine?'#1d6832':'#999';
    wi.style.cursor=mine?'text':'default';
  }
  sc('cell-inputmsg',mine?'← '+lc+'(으)로 시작하는 단어 입력 → Enter':'상대방 차례');
  sc('p1-score',g.p1Score||0);
  sc('p2-score',g.p2Score||0);
  document.getElementById('formula-bar-input').value=`=WORDCHAIN(현재단어,"${lc}",차례)`;

  renderHistory(g.words||[]);
  updateStats(g.words||[]);
  syncPlayers();
  startTimer(g.turnStart);
}

function renderHistory(words) {
  const n=Math.min(words.length,26);
  for(let i=0;i<26;i++) {
    const ri=25-i; // 최신이 위
    if(i<n) {
      const w=words[words.length-1-i];
      const cls=w.player==='p1'?'cell c-blue':'cell c-green';
      sc('h'+ri+'-n',words.length-i);
      const we=document.getElementById('h'+ri+'-w');
      if(we){we.textContent=w.word;we.className=cls+' c-bold';}
      sc('h'+ri+'-p',w.name);
      sc('h'+ri+'-l',w.word.length);
      sc('h'+ri+'-f',w.word[0]);
      sc('h'+ri+'-e',w.word[w.word.length-1]);
      sc('h'+ri+'-t',new Date(w.ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
      sc('h'+ri+'-v','✓ 유효');
    } else {
      ['n','w','p','l','f','e','t','v'].forEach(f=>{
        const el=document.getElementById('h'+ri+'-'+f);
        if(el){el.textContent='';el.className='cell'+(f==='l'?' c-num':'');}
      });
    }
  }
}

function updateStats(words) {
  sc('cell-totalwords',words.length);
  sc('sb-cnt',words.length);
  sc('sb-sum',words.length);
  const avg=words.length?Math.round(words.reduce((a,w)=>a+w.word.length,0)/words.length*10)/10:0;
  sc('cell-avglen',avg);
}

function startTimer(ts) {
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    const rem=Math.max(0,TIME_LIMIT-(Date.now()-ts)/1000);
    const bars=Math.round((rem/TIME_LIMIT)*10);
    sc('cell-timer',Math.ceil(rem)+'s',rem<=10?'c-red':'c-green');
    sc('cell-timerbar','█'.repeat(bars)+'░'.repeat(10-bars));
    if(rem<=0&&isHost&&gameState?.status==='playing'){clearInterval(timerInterval);handleTimeout();}
  },300);
}

async function handleTimeout() {
  const snap=await roomRef.get(); const room=snap.val();
  const loser=gameState.turn, wk=loser==='p1'?'p2':'p1';
  await roomRef.child('game').update({
    status:'ended',winner:wk,winnerName:room[wk]?.name,
    reason:(loser==='p1'?room.p1?.name:room.p2?.name)+' 시간초과',
    endWords:gameState.words?.length||0
  });
}

async function submitWord() {
  if(!gameState||gameState.turn!==playerKey){flashErr('내 차례가 아닙니다');return;}
  const word=vals.word.trim();
  if(!word){flashErr('J6 셀에 단어를 입력하세요');return;}
  const req=gameState.currentWord[gameState.currentWord.length-1];
  if(word[0]!==req){flashErr('"'+req+'"(으)로 시작해야 합니다');return;}
  if(word.length<2){flashErr('2글자 이상 입력하세요');return;}
  if(gameState.usedWords?.[word]){flashErr('이미 사용된 단어입니다');return;}

  const snap=await roomRef.get(); const room=snap.val();
  const words=[...(gameState.words||[]),{word,player:playerKey,name:room[playerKey].name,ts:Date.now()}];
  const uw={...(gameState.usedWords||{}),[word]:true};
  const nt=playerKey==='p1'?'p2':'p1';
  const sk=playerKey+'Score';
  vals.word='';
  syncFieldDisplay('word');
  await roomRef.child('game').update({
    turn:nt,currentWord:word,words,usedWords:uw,
    [sk]:(gameState[sk]||0)+1,turnStart:Date.now()
  });
}

function endGame(g) {
  clearInterval(timerInterval);
  const win=g.winner===playerKey;
  sc('cell-status',win?'🎉 승리!':'패배 :(', win?'c-green':'c-red');
  sc('cell-turn',g.reason||'게임종료','c-yellow');
  sc('cell-curword',win?'WIN 🏆':'LOSE');
  sc('cell-nextchar','G4[방만들기] 클릭시 재시작','c-yellow');
  sc('start-btn','재시작',win?'c-green':'c-yellow');
  document.getElementById('formula-bar-input').value=`=IF(승자="${g.winnerName}","축하합니다! 🎉","아쉽네요 :(")`;
  renderHistory(g.words||[]);
  updateStats(g.words||[]);
  addChatRow('결과',(win?'승리':'패배')+'ㅣ'+g.reason);
}

// ════════════════════════════════════
//  DEMO MODE
// ════════════════════════════════════
const DEMO_MAP={
  '사':'사자','자':'자동차','차':'차이','이':'이상','상':'상자','가':'가방','방':'방학',
  '학':'학교','교':'교실','실':'실력','나':'나무','무':'무지개','개':'개나리','리':'리본',
  '본':'본부','부':'부산','산':'산책','책':'책상','점':'점수','수':'수박','박':'박수',
  '영':'영화','화':'화분','분':'분수','관':'관람','보':'보물','트':'트럭','기':'기차',
  '어':'어머니','니':'니트','비':'비행기','통':'통닭','음':'음악','악':'악어',
  '원':'원숭이','인':'인삼','삼':'삼각형','형':'형광등','등':'등산','목':'목도리',
  '도':'도마뱀','장':'장미','미':'미래','래':'래퍼','퍼':'퍼즐','줄':'줄넘기',
};

function demoMode() {
  roomCode=genCode(); playerKey='p1'; isHost=true;
  myNickname=vals.nick||'플레이어';
  sc('cell-roomshow',roomCode+' (데모)');
  sc('cell-status','데모모드 — AI 대전','c-blue');
  sc('p1-name',myNickname,'c-green');
  sc('p2-name','AI 상대','c-green');
  addChatRow('시스템','Firebase 미설정 → 데모 AI 모드 시작');
  const fw=['사과','바나나','고양이','강아지','컴퓨터','학교','기차'][Math.floor(Math.random()*7)];
  gameState={
    status:'playing',turn:'p1',currentWord:fw,
    words:[{word:fw,player:'p2',name:'AI',ts:Date.now()}],
    usedWords:{[fw]:true},turnStart:Date.now(),p1Score:0,p2Score:0
  };
  renderGame(gameState);
  addChatRow('AI','첫 단어: '+fw);
}

const _origSubmit = submitWord;
submitWord = async function() {
  if(db){await _origSubmit();return;}
  if(!gameState||gameState.turn!=='p1'){flashErr('내 차례가 아닙니다');return;}
  const word=vals.word.trim();
  if(!word){flashErr('J6 셀에 단어 입력');return;}
  const req=gameState.currentWord[gameState.currentWord.length-1];
  if(word[0]!==req){flashErr('"'+req+'"(으)로 시작해야 합니다');return;}
  if(word.length<2){flashErr('2글자 이상');return;}
  if(gameState.usedWords?.[word]){flashErr('이미 사용된 단어');return;}

  vals.word=''; syncFieldDisplay('word');
  gameState.words.push({word,player:'p1',name:myNickname,ts:Date.now()});
  gameState.usedWords[word]=true;
  gameState.currentWord=word; gameState.turn='p2';
  gameState.p1Score++; gameState.turnStart=Date.now();
  renderGame(gameState);

  setTimeout(()=>{
    if(!gameState||gameState.status==='ended') return;
    const lc=gameState.currentWord[gameState.currentWord.length-1];
    const aw=DEMO_MAP[lc];
    if(!aw||gameState.usedWords[aw]){
      gameState.status='ended';gameState.winner='p1';
      gameState.winnerName=myNickname;gameState.reason='AI 응수 불가';
      endGame(gameState);return;
    }
    gameState.words.push({word:aw,player:'p2',name:'AI',ts:Date.now()});
    gameState.usedWords[aw]=true;
    gameState.currentWord=aw;gameState.turn='p1';
    gameState.p2Score++;gameState.turnStart=Date.now();
    renderGame(gameState);
    addChatRow('AI','"'+aw+'"');
  },1000+Math.random()*800);
}

//  INIT
// ════════════════════════════════════
buildGrid();

// word input cell click
document.addEventListener('click', e => {
  const el=e.target.closest('#cell-wordinput');
  if(el && gameState?.turn===playerKey) focusEdit('cell-wordinput','word');
});

// keyboard shortcuts
document.addEventListener('keydown', e => {
  if(e.key==='Enter'&&editField==='word') submitWord();
  if(e.key==='Escape') editField=null;
});

// select D4 on load
setTimeout(()=>{
  const c=document.querySelector('td[data-k="D4"]');
  if(c){c.classList.add('selected');document.getElementById('cell-ref').textContent='D4';}
},100);
